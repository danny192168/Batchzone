<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guess the Impostor</title>
    <link rel="stylesheet" href="index.css" />
    <link href="./output.css" rel="stylesheet" />
    <link rel="stylesheet" href="theme.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="bg-[#F7F5FB]">
    <header class="bg-white border-b border-gray-200">
      <div class="max-w-6xl mx-auto px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between">
        <img src="logo.svg" alt="BATCHZONE" class="h-7 sm:h-9" />
        <div class="flex items-center gap-3 sm:gap-5">
          <button
            class="flex items-center text-gray-700 hover:text-[#1a7a7a] transition-colors text-sm sm:text-base"
          >
            <i class="fa-solid fa-circle-info text-xl"></i>
            <!-- <span class="ml-1 hidden md:inline">Info</span> -->
          </button>
          <!-- <button
            class="flex items-center text-gray-700 hover:text-[#1a7a7a] transition-colors text-sm sm:text-base"
          >
            <i class="fa-solid fa-lightbulb text-xl"></i>
            <span class="ml-1 hidden md:inline">Suggestions</span>
          </button> -->
          <button
            class="flex items-center text-gray-700 hover:text-[#1a7a7a] transition-colors text-sm sm:text-base"
          >
            <i class="fa-solid fa-language text-xl"></i>
            <!-- <span class="ml-1 hidden md:inline">Language</span> -->
          </button>
          <button
            class="flex items-center text-gray-700 hover:text-[#1a7a7a] transition-colors text-sm sm:text-base"
          >
            <i class="fa-solid fa-gear text-xl"></i>
            <!-- <span class="ml-1 hidden md:inline">Report</span> -->
          </button>
          <!-- <button
            class="text-gray-600 px-4 sm:px-5 py-2 rounded-lg hover:bg-[#156565] transition-colors text-sm sm:text-base"
          >
            Login
          </button> -->
        </div>
      </div>
    </header>
    <!-- HERO -->
    <section class="max-w-6xl mx-auto px-4 sm:px-6 py-6 pb-3 sm:py-12">
      <h1 class="text-3xl sm:text-5xl tracking-tight text-gray-900 text-center font-bold">
        Guesss the Impostor
      </h1>
      <div class="max-w-3xl">
        <!-- <p class="text-lg sm:text-xl text-gray-700 sm:mb-8">
          Figure who is pretending among you before they win by guessing the word or avoiding votes.
        </p> -->
      </div>
    </section>
    <!-- Card Container -->
    <section
      class="max-w-6xl mx-auto px-4 sm:px-6 py-3 sm:py-4 flex flex-col gap-6 mb-6 sm:mb-12 text-gray-800"
    >
      <!-- PLAYERS -->
      <div>
        <h2 class="text-xl font-bold mb-2">Players</h2>
        <p class="mb-3">Add at least 3 players to start</p>
        <div class="grid grid-cols-3 gap-4 text-sm sm:text-base text-gray-900">
          <div
            class="flex justify-between w-full rounded-xl shadow-lg overflow-hidden border border-gray-200 py-3 px-3 mb-3 font-bold bg-white"
          >
            <div>John</div>
            <div><i class="fa-solid fa-xmark text-lg"></i></div>
          </div>
          <div
            class="flex justify-between w-full rounded-xl shadow-lg overflow-hidden border border-gray-200 py-3 px-3 mb-3 font-bold bg-white"
          >
            <div>Mary</div>
            <div><i class="fa-solid fa-xmark text-lg"></i></div>
          </div>
          <div
            class="flex justify-between w-full rounded-xl shadow-lg overflow-hidden border border-gray-200 py-3 px-3 mb-3 font-bold bg-white"
          >
            <div>Bob</div>
            <div><i class="fa-solid fa-xmark text-lg"></i></div>
          </div>
        </div>

        <div class="flex gap-3 text-gray-900">
          <input
            type="text"
            placeholder="Enter player name..."
            class="border border-gray-200 focus:outline-none px-3 py-3 rounded-lg font-bold shadow-lg w-1 flex-1 bg-white"
          />
          <div
            class="border border-gray-200 focus:outline-none px-3 py-3 rounded-lg shadow-lg grid place-items-center grid-flow-col bg-white"
          >
            <i class="fa-solid fa-plus text-lg"></i>
            <!-- Add -->
          </div>
        </div>
      </div>

      <!-- CATEGORIES -->
      <div class="text-gray-800">
        <h2 class="text-xl font-bold mb-2">Categories</h2>
        <p class="mb-3">Select categories below or from customs</p>
        <div
          class="flex justify-between w-full rounded-xl shadow-lg overflow-hidden border border-gray-200 py-3 px-3 mb-3 font-bold bg-[#1A7A7A] text-white"
        >
          <div>Everyday Objects</div>
          <div><i class="fa-solid fa-check text-lg"></i></div>
        </div>
        <div
          class="flex justify-between w-full rounded-xl shadow-lg overflow-hidden border border-gray-200 py-3 px-3 mb-3 font-bold bg-white"
        >
          <div>Food and Drinks</div>
          <!-- <div><i class="fa-solid fa-check text-lg"></i></div> -->
        </div>
        <div
          class="flex justify-between w-full rounded-xl shadow-lg overflow-hidden border border-gray-200 py-3 px-3 mb-3 font-bold bg-white"
        >
          <div>Animals and Plants</div>
          <!-- <div><i class="fa-solid fa-check text-lg"></i></div> -->
        </div>
        <div
          class="flex justify-between w-full rounded-xl shadow-lg overflow-hidden border border-gray-200 py-3 px-3 mb-3 font-bold bg-white"
        >
          <div>School & College</div>
          <!-- <div><i class="fa-solid fa-check text-lg"></i></div> -->
        </div>
        <div
          class="flex justify-between w-full rounded-xl shadow-lg overflow-hidden border border-gray-200 py-3 px-3 mb-3 font-bold bg-white"
        >
          <div>School & College</div>
          <!-- <div><i class="fa-solid fa-check text-lg"></i></div> -->
        </div>
        <div
          class="flex justify-between w-full rounded-xl shadow-lg overflow-hidden border border-gray-200 py-3 px-3 mb-3 font-bold bg-white"
        >
          <div>Select Custom</div>
          <div>
            <i class="fa-solid fa-pencil text-lg"></i>
          </div>
        </div>
      </div>

      <!-- IMPOSTOR -->
      <div class="text-white">
        <h2 class="text-xl font-bold mb-2 text-gray-600">Impostor</h2>
        <p class="mb-3 text-gray-600">1 impostor per 3 players is ideal</p>

        <div class="grid grid-cols-2 gap-4 w-full overflow-hidden mb-3 font-bold text-gray-600">
          <div
            class="border border-gray-200 rounded-xl shadow-lg py-3 px-3 bg-[#1A7A7A] text-white"
          >
            1 Impostor
          </div>
          <div class="border border-gray-200 rounded-xl shadow-lg py-3 px-3 bg-white">
            2 Impostors
          </div>
        </div>
      </div>

      <!-- <div class="w-full bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
        <div class="p-4 sm:p-6">
          <h3 class="font-bold text-gray-600 mb-2">Players</h3>
          <p class="text-gray-600">
            This card takes the full width of its parent container and is perfect for feature
            content or game details.
          </p>
        </div>
      </div> -->
      <!-- Start overlay -->
      <div class="sticky bottom-4 w-full max-w-xl flex items-center mx-auto">
        <button
          class="button hover:bg-gray-200 font-bold py-4 w-full px-10 shadow-2xl rounded-xl bg-[#B6174B] text-white text-lg"
        >
          <i class="fa-solid fa-play mr-2"></i>
          Start Game
        </button>
      </div>
    </section>
  </body>
</html>
