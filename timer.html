<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Started</title>
    <link href="styles/output.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="bg-[#1E2939] text-white overflow-hidden">
    <section
      class="max-w-6xl mx-auto px-4 sm:px-6 py-4 sm:py-5 flex flex-col gap-6 min-h-screen relative z-10"
      id="container"
    >
      <section class="flex justify-between p-3 text-gray-200" id="top-button-container">
        <a href="setup.html"
          ><button class="text-2xl" id="back-button">
            <i class="fa-solid fa-angle-left text-shadow-sm"></i></button
        ></a>
        <button class="text-2xl"><i class="fa-solid fa-circle-info text-shadow-sm"></i></button>
      </section>
      <div
        class="absolute transform translate-x-[50%] right-[50%] top-20 flex flex-col items-center transition-opacity duration-[5s]"
        id="notice-box"
      >
        <h2 class="text-2xl font-bold" id="lead-name-text">Bob</h2>
        <h3 class="font-bold">starts the conversation</h3>
      </div>
      <div
        class="mx-auto my-auto flex flex-col gap-5 items-center font-extrabold text-5xl"
        id="timer-box"
      >
        <h3 class="text-2xl text-shadow-md">Timer</h3>
        <h1 class="font-bold text-7xl text-shadow-md" id="time-display">00:00</h1>
      </div>
      <div
        class="absolute transform translate-x-[50%] right-[50%] bottom-5 text-white text-lg font-bold flex gap-2 w-full max-w-90 mx-auto"
        id="button-container"
      >
        <div class="paused-button-container grid grid-cols-2 w-full gap-4 px-4 hidden">
          <button
            class="bg-gray-900 py-4 px-4 rounded-4xl shadow-xl active:bg-gray-800"
            id="resume-button"
          >
            Resume
          </button>
          <button
            class="bg-gray-900 py-4 px-4 rounded-4xl shadow-xl active:bg-gray-800"
            id="vote-button"
          >
            Vote
          </button>
        </div>
        <button
          class="bg-gray-900 py-3 px-4 rounded-4xl shadow-xl active:bg-gray-800 w-60 max-w-full mx-auto"
          id="pause-button"
        >
          Pause
        </button>
      </div>
    </section>
    <div class="lava-box absolute w-full h-full top-0 transition-[top] duration-[1s]" id="lava-box">
      <canvas id="canvas"></canvas>
    </div>
    <script src="scripts/timer.js"></script>
  </body>
</html>
